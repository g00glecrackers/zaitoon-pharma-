<!DOCTYPE html>
<html>
<head>
<title>Login - Zaitoon Pharma</title>
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/logo.png">
<meta name="theme-color" content="#2e7d32">

<style>
/* ===== PAGE BACKGROUND ===== */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: #f4fbf4;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* ===== LOGIN CARD ===== */
.login-box{
  background:white;
  padding:40px;
  width:350px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

/* ===== TITLE ===== */
.login-box h2{
  color:#599a59;
  margin-bottom:20px;
}

/* ===== INPUTS ===== */
.login-box input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

/* ===== INPUT FOCUS ===== */
.login-box input:focus{
  border-color:#599a59;
  outline:none;
}

/* ===== BUTTON ===== */
.login-box button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#599a59;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

/* ===== BUTTON HOVER ===== */
.login-box button:hover{
  background:#4a854a;
}

/* ===== HOME LINK ===== */
.home-link{
  display:block;
  margin-top:15px;
  color:#599a59;
  text-decoration:none;
  font-size:14px;
}

.home-link:hover{
  text-decoration:underline;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>🔐 Admin Login</h2>

  <form onsubmit="login(event)">
    <input id="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <button>Login</button>
  </form>

  <a href="index.html" class="home-link">← Back to Home</a>
</div>

<script>
function login(e){
  e.preventDefault();

fetch("/login", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ email, password })
})
.then(res => res.json())
.then(data => {
  if (data.role === "admin") {
    window.location.href = "/admin.html";
  } else {
    window.location.href = "/index.html";
  }
})
.catch(err => {
  alert("Login error");
});
}
</script>

</body>
</html>
