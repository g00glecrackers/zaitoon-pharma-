<!DOCTYPE html>
<html>
<head>
<title>Orders - Zaitoon Pharma</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/logo.png">
<meta name="theme-color" content="#2e7d32">

</head>
<body>

<h2>Zaitoon Pharma - Orders</h2>
<a href="admin.html"><button>Back</button></a>

<div id="orders"></div>

<script>
fetch("/orders")
.then(res=>res.json())
.then(data=>{
  let div=document.getElementById("orders");

  data.forEach(o=>{
    div.innerHTML+=`
      <div class="card">
        <h3>${o.customerName}</h3>
        <p>Phone: ${o.phone}</p>
        <p>Address: ${o.address}</p>
        <p>Total: ₹${o.total}</p>
        <p>Items: ${o.items.map(i=>i.name).join(", ")}</p>
      </div>
    `;
  });
});
</script>

<a href="https://wa.me/8553490624" target="_blank" class="whatsapp-float">
  <i class="fa-brands fa-whatsapp"></i>
</a>


</body>
</html>
